<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ユーザ登録</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page-auth">
    <main class="auth-wrap">
      <section class="auth-card">
        <h1 class="card-title">ユーザ登録</h1>

        <p class="error-message" th:if="${registerError}" th:text="${registerError}"></p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post">
          <div class="field">
            <label for="username">ユーザ名（半角英字）</label>
            <input id="username" type="text" th:field="*{username}" required />
          </div>

          <div class="field">
            <label for="password">パスワード（半角英数字）</label>
            <input id="password" type="password" th:field="*{password}" required />
          </div>

          <button class="btn btn-success btn-block" type="submit">登録</button>
        </form>

        <div class="center-link">
          <a class="text-link" href="/login">ログインはこちら</a>
        </div>
      </section>
    </main>
  </body>
</html>
