<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page-auth">
    <main class="auth-wrap">
      <h1 class="auth-title">ログイン</h1>

      <section class="auth-card">
        <p class="error-message" th:if="${loginError}" th:text="${loginError}"></p>

        <form th:action="@{/login}" th:object="${loginForm}" method="post">
          <div class="field">
            <label for="username">ユーザー名</label>
            <input id="username" type="text" th:field="*{username}" required />
          </div>

          <div class="field">
            <label for="password">パスワード</label>
            <input id="password" type="password" th:field="*{password}" required />
          </div>

          <button class="btn btn-primary btn-block" type="submit" name="mode" value="web">
            ログイン
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
