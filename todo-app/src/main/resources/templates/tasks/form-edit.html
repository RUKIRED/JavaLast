<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>タスク編集</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page-form">
    <main class="form-shell">
      <h1 class="form-title">タスク編集</h1>

      <form
        class="edit-form"
        th:action="@{/tasks/update/{id}(id=${taskForm.id})}"
        th:object="${taskForm}"
        method="post"
      >
        <div class="field">
          <label for="title">タイトル</label>
          <input id="title" type="text" th:field="*{title}" required />
        </div>

        <div class="field">
          <label for="content">内容</label>
          <textarea id="content" th:field="*{content}"></textarea>
        </div>

        <div class="field">
          <label for="name">登録者</label>
          <input id="name" type="text" th:field="*{name}" />
        </div>

        <div class="field">
          <label for="startDate">開始日</label>
          <input id="startDate" type="date" th:field="*{startDate}" />
        </div>

        <div class="field">
          <label for="endDate">終了日</label>
          <input id="endDate" type="date" th:field="*{endDate}" />
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">更新</button>
          <a class="btn btn-secondary" href="/tasks">キャンセル</a>
        </div>
      </form>
    </main>
  </body>
</html>
