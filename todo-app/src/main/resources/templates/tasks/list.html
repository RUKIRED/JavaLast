<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>タスク一覧</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page-list">
    <main class="list-shell">
      <h1 class="page-title">タスク一覧</h1>

      <div class="info-banner" th:if="${#lists.isEmpty(tasks)}">
        📬 現在タスクは登録されていません。「新規作成」から追加してください。
      </div>

      <section class="table-card" th:if="${!#lists.isEmpty(tasks)}">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>内容</th>
                <th>登録者</th>
                <th>開始日</th>
                <th>終了日</th>
                <th>作成日時</th>
                <th>更新日時</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="task : ${tasks}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.title}"></td>
                <td th:text="${task.content}"></td>
                <td th:text="${task.name}"></td>
                <td th:text="${task.startDate}"></td>
                <td th:text="${task.endDate}"></td>
                <td th:text="${task.createdAt}"></td>
                <td th:text="${task.updatedAt}"></td>
                <td>
                  <div class="table-actions">
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/tasks/edit/{id}(id=${task.id})}">
                      編集
                    </a>
                    <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post">
                      <button class="btn btn-danger btn-sm" type="submit">削除</button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ここを表の外に置く -->
      <div class="list-footer" th:if="${!#lists.isEmpty(tasks)}">
        <div></div>

        <nav class="pagination" th:if="${totalPages > 1}">
          <!-- 前へ -->
          <span class="page-link is-disabled" th:if="${currentPage == 1}">« 前</span>
          <a class="page-link"
             th:if="${currentPage > 1}"
             th:href="@{/tasks(page=${currentPage - 1})}">
            « 前
          </a>

          <!-- ページ番号 -->
          <th:block th:each="pageNum : ${#numbers.sequence(1, totalPages)}">
            <span class="page-link is-active"
                  th:if="${pageNum == currentPage}"
                  th:text="${pageNum}">1</span>

            <a class="page-link"
               th:if="${pageNum != currentPage}"
               th:href="@{/tasks(page=${pageNum})}"
               th:text="${pageNum}">
              1
            </a>
          </th:block>

          <!-- 次へ -->
          <span class="page-link is-disabled" th:if="${currentPage == totalPages}">次 »</span>
          <a class="page-link"
             th:if="${currentPage < totalPages}"
             th:href="@{/tasks(page=${currentPage + 1})}">
            次 »
          </a>
        </nav>

        <div class="footer-create">
          <a class="btn btn-success" href="/tasks/new">+ 新規作成</a>
        </div>
      </div>

      <!-- タスク0件でも右下に出したいならこれ -->
      <div class="list-footer" th:if="${#lists.isEmpty(tasks)}">
        <div></div>
        <div></div>
        <div class="footer-create">
          <a class="btn btn-success" href="/tasks/new">+ 新規作成</a>
        </div>
      </div>
    </main>
  </body>
</html>
